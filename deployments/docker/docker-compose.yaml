services:
  mongo:
    image: mongodb/mongodb-community-server:8.2-ubuntu2204
    container_name: clawhire-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - clawhire_mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: clawhire

volumes:
  clawhire_mongo_data:
